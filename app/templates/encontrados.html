<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Itens Encontrados</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2>
        Itens Encontrados
    </h2>

    <table class="table table-striped">

        <thead class="thead-dark">

            <tr>

                <th>Item</th>
                <th>Local Encontrado</th>
                <th>Data Encontro</th>

            </tr>

        </thead>

        <tbody>

            {% for encontrado in encontrados %}

            <tr>

                <td>{{ encontrado.item }}</td>

                <td>{{ encontrado.local_encontrado }}</td>

                <td>{{ encontrado.data_encontro }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
