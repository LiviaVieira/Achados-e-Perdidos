<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXCLUSÕES</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body{
    background:#f5f5f5;
}

.container{
    margin-top:40px;
}

.card{
    padding:20px;
    border:none;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    color:#007bff;
}

</style>

</head>
<body>

<div class="container">

    <div class="card">

        <h2>EXCLUSÕES</h2>

        <a href="/"
           class="btn btn-primary mb-3">
           Voltar
        </a>

        <table class="table table-bordered">

            <tr>
            <th>ID Item</th>
            <th>Motivo</th>
            </tr>
            
            {% for exclusao in exclusoes %}
            <tr>
            <td>{{ exclusao.id_item }}</td>
            <td>{{ exclusao.motivo_exclusao }}</td>
            </tr>
            {% endfor %}
            
            </table>

    </div>

</div>

</body>
</html>
