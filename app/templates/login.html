<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login</title>


<link rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">


</head>

<body>

<div class="container mt-5">


<div class="card p-4">

    <h2 class="text-center mb-4"> Login do Sistema </h2>

    <form method="POST">

        {% csrf_token %}
    
        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Digite seu email">
        </div>
    
        <div class="form-group">
            <label>Senha</label>
            <input type="password"
                   name="senha"
                   class="form-control"
                   placeholder="Digite sua senha">
        </div>
    
        <button type="submit"
                class="btn btn-primary btn-block">
            Entrar
        </button>

        <div class="text-center mt-3"> <a href="/">Voltar para Home</a> </div>
    
    </form>
    
    {% if erro %}
    <div class="alert alert-danger mt-3">
        {{ erro }}
    </div>
    {% endif %}

</div>


</div>

</body>
</html>
