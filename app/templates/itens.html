<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ITENS PERDIDOS</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body{
    background:#f5f5f5;
}

.container{
    margin-top:40px;
}

.card{
    padding:20px;
    border:none;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    color:#007bff;
}

</style>

</head>
<body>

<div class="container">

    <div class="card">

        <h2>ITENS PERDIDOS</h2>

        <a href="/"
           class="btn btn-primary mb-3">
           Voltar
        </a>

        <table class="table table-bordered">

            <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Data Perda</th>
            <th>Categoria</th>
            <th>Status</th>
            </tr>
            
            {% for item in itens %}
            <tr>
            <td>{{ item.nome_item }}</td>
            <td>{{ item.descricao }}</td>
            <td>{{ item.data_perda }}</td>
            <td>{{ item.categoria }}</td>
            <td>{{ item.status }}</td>
            </tr>
            {% endfor %}
            
            </table>

    </div>

</div>

</body>
</html>
